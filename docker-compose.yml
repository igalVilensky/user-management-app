services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: user-management-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/database.db:/app/database.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: user-management-web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always
